# Workflow to update lock files
name: Update lock files
permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

env:
  # Keep in sync with the pixi version used in the other workflows.
  PIXI_VERSION: v0.70.1

jobs:
  # Update the single multi-environment pixi lock file that drives most of the
  # CI builds. A single `pixi update` re-solves every environment declared in
  # pyproject.toml (conda-forge + PyPI), including the nightly/dev `scipy-dev`
  # environment and the GPU `cuda` environment.
  update_pixi_lock_file:
    if: github.repository == 'scikit-learn/scikit-learn'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          manifest-path: pyproject.toml
          # We only need the pixi binary to update the lock file, not the
          # environments themselves.
          run-install: false

      - name: Update pixi lock file
        run: pixi update

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          push-to-fork: scikit-learn-bot/scikit-learn
          # The markers in the commit message trigger the conditional CI jobs
          # (free-threaded and the documentation build) so that the updated
          # environments are actually exercised on the PR. scipy-dev is not
          # included on purpose: it does not use pixi and installs the latest
          # development dependencies at run time, independently of the lock file.
          commit-message: "Update CI pixi lock file [free-threaded] [doc build]"
          committer: "Lock file bot <noreply@github.com>"
          author: "Lock file bot <noreply@github.com>"
          delete-branch: true
          branch: auto-update-lock-files-pixi
          # Trigger the (expensive) CUDA GPU CI on the generated PR so that the
          # updated `cuda` environment is validated as well.
          labels: "CUDA CI"
          title: ":lock: :robot: CI Update pixi lock file :lock: :robot:"
          body: |
            Update the pixi lock file.

            ### Note
            If the CI tasks fail, create a new branch based on this PR and add the required fixes to that branch.

      - name: Check Pull Request
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          echo "### :rocket: Pull-Request Summary" >> ${GITHUB_STEP_SUMMARY}
          echo "" >> ${GITHUB_STEP_SUMMARY}
          echo "The following lock files pull-request has been auto-generated:"
          echo "- **PR** #${{ steps.cpr.outputs.pull-request-number }}" >> ${GITHUB_STEP_SUMMARY}
          echo "- **URL** ${{ steps.cpr.outputs.pull-request-url }}" >> ${GITHUB_STEP_SUMMARY}
          echo "- **Operation** [${{ steps.cpr.outputs.pull-request-operation }}]" >> ${GITHUB_STEP_SUMMARY}
          echo "- **SHA** ${{ steps.cpr.outputs.pull-request-head-sha }}" >> ${GITHUB_STEP_SUMMARY}

  # The ubuntu_atlas and debian_32bit builds do not use a conda/pixi
  # environment: they install numpy/scipy with apt and the remaining
  # dependencies from a pip lock file. These two lock files are still maintained
  # with the legacy `update_environments_and_lock_files.py` script.
  update_pip_lock_files:
    if: github.repository == 'scikit-learn/scikit-learn'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Generate pip lock files
        run: |
          source $CONDA/bin/activate
          conda install -n base conda conda-libmamba-solver -y
          conda config --set solver libmamba
          python build_tools/update_environments_and_lock_files.py \
            --select-build "debian_32bit|ubuntu_atlas"

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          push-to-fork: scikit-learn-bot/scikit-learn
          commit-message: "Update CI pip lock files"
          committer: "Lock file bot <noreply@github.com>"
          author: "Lock file bot <noreply@github.com>"
          delete-branch: true
          branch: auto-update-lock-files-pip
          title: ":lock: :robot: CI Update pip lock files :lock: :robot:"
          body: |
            Update the pip lock files for the ubuntu_atlas and debian_32bit builds.

            ### Note
            If the CI tasks fail, create a new branch based on this PR and add the required fixes to that branch.

      - name: Check Pull Request
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          echo "### :rocket: Pull-Request Summary" >> ${GITHUB_STEP_SUMMARY}
          echo "" >> ${GITHUB_STEP_SUMMARY}
          echo "The following lock files pull-request has been auto-generated:"
          echo "- **PR** #${{ steps.cpr.outputs.pull-request-number }}" >> ${GITHUB_STEP_SUMMARY}
          echo "- **URL** ${{ steps.cpr.outputs.pull-request-url }}" >> ${GITHUB_STEP_SUMMARY}
          echo "- **Operation** [${{ steps.cpr.outputs.pull-request-operation }}]" >> ${GITHUB_STEP_SUMMARY}
          echo "- **SHA** ${{ steps.cpr.outputs.pull-request-head-sha }}" >> ${GITHUB_STEP_SUMMARY}
