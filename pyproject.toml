[project]
name = "scikit-learn"
dynamic = ["version"]
description = "A set of python modules for machine learning and data mining"
readme = "README.rst"
maintainers = [
    {name = "scikit-learn developers", email="scikit-learn@python.org"},
]
dependencies = [
  "numpy>=1.24.1",
  "scipy>=1.10.0",
  "joblib>=1.4.0",
  "narwhals>=2.0.1",
  "threadpoolctl>=3.5.0",
]
requires-python = ">=3.11"
license = "BSD-3-Clause"
license-files = ["COPYING"]
classifiers=[
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "Programming Language :: C",
  "Programming Language :: Python",
  "Topic :: Software Development",
  "Topic :: Scientific/Engineering",
  "Development Status :: 5 - Production/Stable",
  "Operating System :: Microsoft :: Windows",
  "Operating System :: POSIX",
  "Operating System :: Unix",
  "Operating System :: MacOS",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
]

[project.urls]
homepage = "https://scikit-learn.org"
source = "https://github.com/scikit-learn/scikit-learn"
download = "https://pypi.org/project/scikit-learn/#files"
tracker = "https://github.com/scikit-learn/scikit-learn/issues"
"release notes" = "https://scikit-learn.org/stable/whats_new"

[project.optional-dependencies]
build = ["numpy>=1.24.1", "scipy>=1.10.0", "cython>=3.1.2", "meson-python>=0.17.1"]
install = ["numpy>=1.24.1", "scipy>=1.10.0", "joblib>=1.4.0", "narwhals>=2.0.1", "threadpoolctl>=3.5.0"]
benchmark = ["matplotlib>=3.6.1", "pandas>=1.5.0", "memory_profiler>=0.57.0"]
docs = [
    "matplotlib>=3.6.1",
    "scikit-image>=0.22.0",
    "pandas>=1.5.0",
    "rich>=14.1.0",
    "seaborn>=0.13.0",
    "memory_profiler>=0.57.0",
    "sphinx>=7.3.7",
    "sphinx-copybutton>=0.5.2",
    "sphinx-gallery>=0.17.1",
    "numpydoc>=1.2.0",
    "Pillow>=12.1.1",
    "pooch>=1.8.0",
    "sphinx-prompt>=1.4.0",
    "sphinxext-opengraph>=0.9.1",
    "plotly>=5.22.0",
    "polars>=0.20.30",
    "sphinx-design>=0.6.0",
    "sphinxcontrib-sass>=0.3.4",
    "pydata-sphinx-theme>=0.15.3",
    "sphinx-remove-toctrees>=1.0.0.post1",
    "towncrier>=24.8.0",
]
examples = [
    "matplotlib>=3.6.1",
    "scikit-image>=0.22.0",
    "pandas>=1.5.0",
    "rich>=14.1.0",
    "seaborn>=0.13.0",
    "pooch>=1.8.0",
    "plotly>=5.22.0",
]
tests = [
    "matplotlib>=3.6.1",
    "pandas>=1.5.0",
    "rich>=14.1.0",
    "pytest>=7.1.2",
    "pytest-cov>=2.9.0",
    "ruff>=0.12.2",
    "mypy>=1.15",
    "pyamg>=5.0.0",
    "polars>=0.20.30",
    "pyarrow>=13.0.0",
    "numpydoc>=1.2.0",
    "pooch>=1.8.0",
]
maintenance = ["conda-lock==3.0.1"]

[build-system]
build-backend = "mesonpy"
# Minimum requirements for the build system to execute.
requires = [
    "meson-python>=0.17.1",
    "cython>=3.1.2",
    "numpy>=2",
    "scipy>=1.10.0",
]

# =============================================================================
# pixi configuration
# =============================================================================
# This section defines the conda/PyPI environments used by the CI. Each CI build
# maps to a pixi environment (see ``[tool.pixi.environments]``) which is composed
# of a single "feature" describing its dependencies and target platform. The
# resolved versions are stored in ``pixi.lock`` (a single multi-environment lock
# file that replaces the per-build conda-lock ``*.lock`` files).
#
# The minimum-dependency pins (marked with ``# min``) are generated from
# ``sklearn/_min_dependencies.py`` by ``build_tools/update_pixi_min_pins.py``;
# do not edit them by hand.
#
# scikit-learn itself is intentionally NOT declared as a pixi dependency: the CI
# builds it with ``pip install --no-build-isolation -e .`` on top of the pixi
# environment, exactly like the previous conda-lock based setup.
[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

# Default (a.k.a. local development) environment. CI environments all set
# ``no-default-feature = true`` so these dependencies never leak into them.
[tool.pixi.dependencies]
python = "*"
numpy = "*"
scipy = "*"
cython = ">=3.1.2"
meson-python = ">=0.17.1"
ninja = "*"
joblib = "*"
narwhals = "*"
threadpoolctl = "*"
matplotlib = "*"
pandas = "*"
rich = "*"
pyamg = "*"
polars = "*"
pyarrow = "*"
pillow = "*"
pytest = "*"
pytest-xdist = "*"
pytest-cov = "<=6.3.0"
coverage = "*"
ruff = "*"
mypy = "*"
cython-lint = "*"
array-api-strict = "*"
pip = "*"
ccache = "*"

# ----------------------------------------------------------------------------
# Linux x86-64 - conda-forge + MKL + PyTorch (main CI build)
# build: pylatest_conda_forge_mkl_linux-64
