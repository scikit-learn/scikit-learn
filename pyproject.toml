# ----------------------------------------------------------------------------
# NOTE: the scipy-dev build (numpy/scipy/pandas nightly wheels + git-master
# Cython/joblib/Pillow) is intentionally NOT managed by pixi. Those development
# versions change every day, while pixi.lock is only refreshed weekly, so
# pinning them would mean testing stale "dev" versions and churning the lock.
# That build installs its dependencies at run time instead; see the `scipy-dev`
# job in .github/workflows/unit-tests.yml and the `scipy-dev` branch in
# build_tools/github/install.sh.

